<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Book Library</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-card" style="max-width: 28rem;">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-user-lock"></i>
            </div>
            <h1>Welcome Back</h1>
        </div>

        <div id="errorAlert" class="alert alert-danger">
            <span>Invalid email or password.</span>
        </div>

        <div id="logoutAlert" class="alert alert-success">
            <span>You have been logged out.</span>
        </div>

        <form action="/login" method="post">
            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required autofocus />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required />
            </div>

            <button type="submit" class="btn" style="width: 100%;">Login</button>

            <div style="text-align: center; margin-top: 1rem; font-size: 0.875rem;">
                Don't have an account? <a href="register.html" style="color: var(--primary);">Register here</a>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            const alert = document.getElementById('errorAlert');
            alert.style.display = 'block';
            alert.classList.add('visible');
        }
        if (urlParams.has('logout')) {
            const alert = document.getElementById('logoutAlert');
            alert.style.display = 'block';
            alert.classList.add('visible');
        }
    </script>
</body>
</html>
