<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Library - Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="nav-brand">
            <i class="fas fa-book-reader"></i>
            <span>BookLibrary</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="books.html">Books</a></li>
            <li><a href="authors.html">Authors</a></li>
            <li><a href="categories.html">Categories</a></li>
            <li class="admin-only hidden"><a href="users.html">Users</a></li>
            <li id="profile-link" class="hidden"><a href="profile.html" class="active">Profile</a></li>
            <li id="logout-link" class="hidden"><a href="#" onclick="auth.logout()" class="btn btn-outline">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h1 id="user-name">Loading Profile...</h1>
                <p id="user-email" style="color: var(--muted-foreground);"></p>
            </div>

            <h2>Personal Details</h2>
            <form id="profile-form" style="margin-top: 1rem;">
                <div class="form-group">
                    <label>Phone Number</label>
                    <label for="profile-phone"><input type="text" id="profile-phone"></label>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <label for="profile-address">
                        <input type="text" id="profile-address">
                    </label>
                </div>
                <div class="form-group">
                    <label>Birth Date</label>
                    <label for="profile-birth">
                        <input type="date" id="profile-birth">
                    </label>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Update Profile</button>
            </form>
        </div>
    </div>

    <style>
        .active { border-bottom: 2px solid var(--primary); }
    </style>

    <script src="script.js?v=1.1"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await ui.updateAuthLinks();
                await profile.load();
            } catch (err) {
                console.error('Initialization error:', err);
            }
        });
    </script>
</body>
</html>
