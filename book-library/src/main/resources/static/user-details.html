<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Library - User Details (Admin)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="nav-brand">
            <i class="fas fa-book-reader"></i>
            <span>BookLibrary</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="books.html">Books</a></li>
            <li><a href="authors.html">Authors</a></li>
            <li><a href="categories.html">Categories</a></li>
            <li class="admin-only"><a href="users.html" class="active">Users</a></li>
            <li id="logout-link"><a href="#" onclick="auth.logout()" class="btn btn-outline">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="section-header">
            <a href="users.html" style="text-decoration: none; color: var(--primary); margin-bottom: 1rem; display: inline-block;">
                <i class="fas fa-arrow-left"></i> Back to Users
            </a>
            <h1 id="detail-user-name">User Profile</h1>
            <p id="detail-user-email" style="color: var(--muted-foreground);"></p>
        </div>

        <div class="auth-card" id="rentals-section">
            <h2>Active Rentals</h2>
            <div id="detail-rentals-list" style="margin-top: 1rem;">
                <p style="color: var(--muted-foreground);">Loading active rentals...</p>
            </div>
        </div>

        <div class="auth-card" id="history-section" style="margin-top: 2rem;">
            <h2>Rental History</h2>
            <div id="detail-history-list" style="margin-top: 1rem;">
                <p style="color: var(--muted-foreground);">Loading rental history...</p>
            </div>
        </div>
    </div>

    <script src="script.js?v=1.1"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id');
            
            if (!userId) {
                window.location.href = 'users.html';
                return;
            }

            try {
                const admin = await auth.getCurrentUser();
                if (!admin || !admin.isAdmin) {
                    window.location.href = 'index.html';
                    return;
                }
                
                await adminDetails.load(userId);
            } catch (err) {
                console.error('Initialization error:', err);
            }
        });
    </script>
</body>
</html>
