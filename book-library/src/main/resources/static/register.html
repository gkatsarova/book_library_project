<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Book Library</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-card" style="max-width: 32rem;">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>Register Account</h1>
        </div>

        <div id="successAlert" class="alert alert-success">
            <span>Registration successful! <a href="login.html">Login here</a></span>
        </div>

        <div id="errorAlert" class="alert alert-danger">
            <span></span>
        </div>

        <form id="registrationForm">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input id="firstName" name="firstName" type="text" required />
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input id="lastName" name="lastName" type="text" required />
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required />
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input id="confirmPassword" name="confirmPassword" type="password" required />
            </div>

            <button type="submit" class="btn" style="width: 100%;">Register</button>

            <div style="text-align: center; margin-top: 1rem; font-size: 0.875rem;">
                Already registered? <a href="login.html" style="color: var(--primary);">Login here</a>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
