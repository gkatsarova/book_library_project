<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Library - Books</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="nav-brand">
            <i class="fas fa-book-reader"></i>
            <span>BookLibrary</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="books.html" class="active">Books</a></li>
            <li><a href="authors.html">Authors</a></li>
            <li><a href="categories.html">Categories</a></li>
            <li class="admin-only hidden"><a href="users.html">Users</a></li>
            <li id="profile-link" class="hidden"><a href="profile.html">Profile</a></li>
            <li id="login-link"><a href="login.html" class="btn">Login</a></li>
            <li id="logout-link" class="hidden"><a href="#" onclick="auth.logout()" class="btn btn-outline">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="section-header">
            <h1>Books Inventory</h1>
            <button class="btn admin-only hidden" onclick="ui.showModal('book-modal')">Add New Book</button>
        </div>

        <div class="content-grid" id="books-list"></div>
    </div>

    <!-- Modal -->
    <div id="book-modal" class="modal hidden">
        <div class="auth-card" style="max-width: 32rem; margin: auto;">
            <h2>Book Details</h2>
            <form id="book-form">
                <input type="hidden" id="book-id">
                <div class="form-group">
                    <label>Title</label>
                    <label for="book-title"></label><input type="text" id="book-title" required>
                </div>
                <!-- Role selection removed, defaulted to user in backend -->
                <div class="form-group">
                    <label>Author</label>
                    <label for="book-author">
                        <select id="book-author" required></select>
                    </label>
                </div>
                <div class="form-group">
                    <label>ISBN</label>
                    <label for="book-isbn">
                        <input type="text" id="book-isbn" required>
                    </label>
                </div>
                <div class="form-group">
                    <label for="book-cover">Cover Image URL</label>
                    <input type="text" id="book-cover" placeholder="https://example.com/image.jpg">
                </div>
                <div class="form-group">
                    <label>Categories (comma-separated)</label>
                    <label for="book-categories">
                        <input type="text" id="book-categories" placeholder="Fiction, Science, History">
                    </label>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <label for="book-description">
                        <textarea id="book-description" rows="3"></textarea>
                    </label>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn" style="flex: 1;">Save</button>
                    <button type="button" class="btn btn-outline" onclick="ui.hideModal('book-modal')" style="flex: 1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Rental Modal -->
    <div id="rental-modal" class="modal hidden">
        <div class="auth-card" style="max-width: 25rem; margin: auto;">
            <h2>Rent Book</h2>
            <p id="rental-book-title" style="margin-bottom: 1rem; font-weight: bold;"></p>
            <form id="rental-form">
                <input type="hidden" id="rental-book-id">
                <div class="form-group">
                    <label>Return Date</label>
                    <label for="return-date">
                        <input type="date" id="return-date" required>
                    </label>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn" style="flex: 1;">Confirm Rental</button>
                    <button type="button" class="btn btn-outline" onclick="ui.hideModal('rental-modal')" style="flex: 1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>


    <style>
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; z-index: 1000;
        }
        .modal.hidden { display: none; }
        .active { border-bottom: 2px solid var(--primary); }
    </style>

    <script src="script.js?v=1.1"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await ui.updateAuthLinks();
                await books.loadAll();
                await books.loadAuthorsForSelect();
            } catch (err) {
                console.error('Initialization error:', err);
            }
        });
    </script>
</body>
</html>
